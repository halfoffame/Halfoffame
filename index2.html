<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:500px;
    height:750px;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.header{
    background:#1e293b;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#38bdf8;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    max-width:80%;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#374151;
}

.bottom{
    display:flex;
    padding:10px;
    background:#1e293b;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    padding:15px;
    margin-left:10px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
ASS APP
</div>

<div class="chat" id="chat">

<div class="msg ai">
Merhaba 👋 Ben ASS APP
</div>

</div>

<div class="bottom">
<input id="input" placeholder="Bir şey yaz...">
<button onclick="send()">Gönder</button>
</div>

</div>

<script>

function aiBrain(text){

    text = text.toLowerCase();

    if(text.includes("merhaba")) return "Merhaba 👋";
    if(text.includes("selam")) return "Selam 😊";
    if(text.includes("nasılsın")) return "İyiyim, sen?";
    if(text.includes("adın ne")) return "Ben ASS APP 🤖";
    if(text.includes("ne yapıyorsun")) return "Sana yardımcı oluyorum.";
    if(text.includes("yapay zeka")) return "Ben basit bir yapay zekayım.";
    if(text.includes("html")) return "HTML web sayfası oluşturur.";
    if(text.includes("css")) return "CSS tasarım yapar.";
    if(text.includes("javascript")) return "JS web sayfasını akıllı yapar.";
    if(text.includes("github")) return "Kodlarını sakladığın platformdur.";

    // basit matematik
    try{
        if(/[0-9+\-*/]/.test(text)){
            return "Sonuç: " + eval(text);
        }
    }catch(e){}

    const answers = [
        "Bunu anlamadım 🤔",
        "Biraz daha açık yazar mısın?",
        "İlginç soru 😄",
        "Bilmiyorum ama öğrenebilirim."
    ];

    return answers[Math.floor(Math.random()*answers.length)];
}

function send(){

    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    let text = input.value;
    if(text.trim() === "") return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;

    let reply = aiBrain(text);

    setTimeout(()=>{
        chat.innerHTML += `<div class="msg ai">${reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
    },400);

    input.value = "";
}
</script>

</body>
</html>
