<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:500px;
    height:750px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    background:#1e293b;
    padding:20px;
    text-align:center;
    font-size:28px;
    color:#38bdf8;
    font-weight:bold;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    max-width:80%;
    line-height:1.4;
}

.user{background:#2563eb;margin-left:auto;}
.ai{background:#374151;}

.bottom{
    display:flex;
    padding:10px;
    background:#1e293b;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

button{
    margin-left:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0ea5e9;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
ASS APP 🤖
</div>

<div class="chat" id="chat">
<div class="msg ai">Merhaba 👋 Ben ASS APP, sana yardımcı olabilirim.</div>
</div>

<div class="bottom">
<input id="input" placeholder="Sorunu yaz...">
<button onclick="send()">Gönder</button>
</div>

</div>

<script>

const API_KEY = "BURAYA_API_KEYİNİ_YAPISTIR";

async function send(){

    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    const text = input.value;
    if(!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;

    input.value = "";

    chat.innerHTML += `<div class="msg ai" id="loading">Yazıyor...</div>`;

    try{

        const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                contents:[
                    {
                        parts:[
                            {
                                text: "Sen ASS APP isimli bir yapay zekasın. Kullanıcıya her konuda yardımcı ol. " + text
                            }
                        ]
                    }
                ]
            })
        });

        const data = await response.json();

        document.getElementById("loading").remove();

        let reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Cevap alınamadı";

        chat.innerHTML += `<div class="msg ai">${reply}</div>`;

        chat.scrollTop = chat.scrollHeight;

    }catch(err){

        document.getElementById("loading").innerHTML =
        "Hata oluştu. API key kontrol et.";

    }
}

</script>

</body>
</html>
