<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ASS APP</title>
</head>
<body>

<h1>ASS APP</h1>

<input id="msg" placeholder="Mesaj yaz">
<button onclick="send()">Gönder</button>

<div id="chat"></div>

<script>
async function send() {
  const text = document.getElementById("msg").value;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text
    })
  });

  const data = await res.json();

  document.getElementById("chat").innerHTML +=
    "<p><b>Sen:</b> " + text + "</p>" +
    "<p><b>ASS APP:</b> " + data.reply + "</p>";
}
</script>

</body>
</html>
