<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    height:700px;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
}

.header{
    background:#1e293b;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

.chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.message{
    margin:12px 0;
    padding:12px;
    border-radius:12px;
    max-width:80%;
    line-height:1.5;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#374151;
}

.input-box{
    display:flex;
    padding:15px;
    background:#1e293b;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    outline:none;
    background:#0f172a;
    color:white;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0ea5e9;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        AS App
    </div>

    <div class="chat" id="chat">

        <div class="message ai">
            Merhaba 👋<br>
            Ben AS App yapay zekasıyım.
        </div>

    </div>

    <div class="input-box">
        <input type="text" id="question" placeholder="Bir şey yaz..." />
        <button onclick="sendMessage()">Gönder</button>
    </div>

</div>

<script>

const apiKey = "BURAYA_OPENAI_API_KEY";

async function sendMessage(){

    const input = document.getElementById("question");
    const chat = document.getElementById("chat");

    let text = input.value;

    if(text.trim() === "") return;

    // Kullanıcı mesajı
    chat.innerHTML += `
        <div class="message user">
            ${text}
        </div>
    `;

    input.value = "";

    // Yazıyor efekti
    const loadingId = "loading-" + Date.now();

    chat.innerHTML += `
        <div class="message ai" id="${loadingId}">
            Yazıyor...
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try{

        const response = await fetch("https://api.openai.com/v1/chat/completions",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + apiKey
            },

            body:JSON.stringify({

                model:"gpt-4o-mini",

                messages:[
                    {
                        role:"system",
                        content:"Sen AS App isimli gelişmiş bir yapay zekasın."
                    },
                    {
                        role:"user",
                        content:text
                    }
                ]

            })

        });

        const data = await response.json();

        let aiText = data.choices[0].message.content;

        document.getElementById(loadingId).innerHTML = aiText;

    }catch(error){

        document.getElementById(loadingId).innerHTML =
        "Hata oluştu.";

    }

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
