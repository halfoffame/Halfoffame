<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:white;
    width:100%;
    min-height:100vh;
    padding:40px;
}

h1{
    text-align:center;
    font-size:170px;
    font-weight:900;
    color:black;
    margin-bottom:60px;
}

.chat-box{
    width:100%;
}

.input-area{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:25px;
    border-radius:20px;
    border:2px solid #ddd;
    font-size:30px;
    outline:none;
}

button{
    width:220px;
    border:none;
    border-radius:20px;
    background:black;
    color:white;
    font-size:32px;
    cursor:pointer;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#reply{
    width:100%;
    min-height:350px;
    border:2px solid #ddd;
    border-radius:20px;
    padding:30px;
    font-size:28px;
    color:#333;
}

</style>
</head>

<body>

<h1>ASS APP</h1>

<div class="chat-box">

<div class="input-area">

<input
type="text"
id="message"
placeholder="Mesajınızı yazın..."
>

<button onclick="sendMessage()">
Gönder
</button>

</div>

<div id="reply">
Cevap burada görünecek...
</div>

</div>

<script>

async function sendMessage(){

const message =
document.getElementById("message").value;

document.getElementById("reply").innerHTML =
"Yazıyor...";

try{

const response = await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

});

const data = await response.json();

document.getElementById("reply").innerHTML =
data.reply;

}catch(error){

document.getElementById("reply").innerHTML =
"Hata oluştu.";

console.log(error);

}

}

</script>

</body>
</html>
