<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid #ddd;
}

header h1{
    font-size:60px;
    font-weight:900;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:80%;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    line-height:1.5;
}

.user{
    background:#f0f0f0;
    margin-left:auto;
}

.ai{
    background:#e8f4ff;
}

.footer{
    display:flex;
    gap:10px;
    padding:20px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:15px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>
<body>

<header>
    <h1>ASS APP</h1>
</header>

<div id="chat"></div>

<div class="footer">
    <input
        type="text"
        id="message"
        placeholder="ASS APP'e bir şey sor..."
        onkeypress="if(event.key==='Enter') sendMessage()"
    >
    <button onclick="sendMessage()">Gönder</button>
</div>

<script>

async function sendMessage(){

    const input = document.getElementById("message");
    const text = input.value.trim();

    if(!text) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message user">
            ${text}
        </div>
    `;

    input.value = "";

    try{

        const response = await fetch("/api/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        });

        const data = await response.json();

        chat.innerHTML += `
            <div class="message ai">
                ${data.reply}
            </div>
        `;

        chat.scrollTop = chat.scrollHeight;

    }catch(error){

        chat.innerHTML += `
            <div class="message ai">
                Bağlantı hatası oluştu.
            </div>
        `;

    }

}

</script>

</body>
</html>
