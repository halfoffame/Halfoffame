<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:500px;
    height:750px;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.header{
    background:#1e293b;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#38bdf8;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    max-width:80%;
    line-height:1.5;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#374151;
}

.bottom{
    display:flex;
    padding:10px;
    background:#1e293b;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    padding:15px;
    margin-left:10px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

    <div class="header">
        ASS APP
    </div>

    <div class="chat" id="chat">

        <div class="msg ai">
            Merhaba 👋<br>
            Ben ASS APP yapay zekasıyım.
        </div>

    </div>

    <div class="bottom">
        <input type="text" id="input" placeholder="Bir soru yaz...">
        <button onclick="sendMessage()">Gönder</button>
    </div>

</div>

<script>

const API_KEY = "BURAYA_GEMINI_API_KEY";

async function sendMessage(){

    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    const text = input.value;

    if(text.trim() === "") return;

    chat.innerHTML += `
        <div class="msg user">
            ${text}
        </div>
    `;

    input.value = "";

    chat.innerHTML += `
        <div class="msg ai" id="loading">
            Yazıyor...
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try{

        const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                contents:[
                    {
                        parts:[
                            {
                                text:text
                            }
                        ]
                    }
                ]

            })

        });

        const data = await response.json();

        document.getElementById("loading").remove();

        if(data.error){

            chat.innerHTML += `
                <div class="msg ai">
                    HATA: ${data.error.message}
                </div>
            `;

            return;
        }

        const answer =
        data.candidates[0].content.parts[0].text;

        chat.innerHTML += `
            <div class="msg ai">
                ${answer}
            </div>
        `;

    }catch(err){

        document.getElementById("loading").innerHTML =
        "Bağlantı hatası oluştu.";

        console.log(err);

    }

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
