<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ASS APP</title>

<style>
body{
  background:white;
  font-family:Arial;
  padding:20px;
}

h1{
  text-align:center;
  font-size:100px;
  font-weight:900;
}

#chat{
  border:1px solid #ddd;
  min-height:400px;
  padding:20px;
  margin-bottom:20px;
}

input{
  width:80%;
  padding:15px;
}

button{
  padding:15px;
}
</style>

</head>
<body>

<h1>ASS APP</h1>

<div id="chat"></div>

<input id="message" placeholder="Mesaj yaz">
<button onclick="sendMessage()">Gönder</button>

<script>
async function sendMessage(){

  const input =
    document.getElementById("message");

  const message =
    input.value;

  const response =
    await fetch("/api/chat",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        message
      })

  });

  const data =
    await response.json();

  document.getElementById("chat").innerHTML +=
    "<p><b>Sen:</b> " + message + "</p>" +
    "<p><b>ASS APP:</b> " + data.reply + "</p>";

  input.value = "";
}
</script>

</body>
</html>
