<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AS App</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:500px;
    height:700px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.top{
    padding:20px;
    background:#1e293b;
    text-align:center;
    font-size:28px;
    color:#38bdf8;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    padding:12px;
    margin:10px 0;
    border-radius:12px;
}

.user{
    background:#2563eb;
}

.bot{
    background:#374151;
}

.bottom{
    display:flex;
    padding:10px;
    background:#1e293b;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    padding:12px;
    margin-left:10px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
}

</style>
</head>

<body>

<div class="box">

<div class="top">
AS App
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
<input type="text" id="text" placeholder="Soru yaz">
<button onclick="send()">Gönder</button>
</div>

</div>

<script>

const API_KEY = "BURAYA_API_KEY";

const messages = [
{
role:"system",
content:"Sen AS App isimli gelişmiş yapay zekasın."
}
];

function add(text,type){

    const chat = document.getElementById("chat");

    chat.innerHTML += `
    <div class="msg ${type}">
    ${text}
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const input = document.getElementById("text");

    const text = input.value;

    if(text.trim() == "") return;

    add(text,"user");

    input.value = "";

    messages.push({
        role:"user",
        content:text
    });

    add("Yazıyor...","bot");

    try{

        const response = await fetch(
        "https://api.openai.com/v1/chat/completions",
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + API_KEY
            },

            body:JSON.stringify({

                model:"gpt-4o-mini",

                messages:messages

            })

        });

        const data = await response.json();

        document.querySelector(".bot:last-child").remove();

        console.log(data);

        if(data.error){

            add("HATA: " + data.error.message,"bot");
            return;
        }

        const reply = data.choices[0].message.content;

        add(reply,"bot");

        messages.push({
            role:"assistant",
            content:reply
        });

    }catch(err){

        document.querySelector(".bot:last-child").remove();

        add("Bağlantı hatası oluştu.","bot");

        console.log(err);

    }

}

</script>

</body>
</html>
