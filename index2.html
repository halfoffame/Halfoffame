<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ASS APP</title>
<style>
body { font-family: Arial; margin: 0; }
#chat { height: 80vh; overflow-y: auto; padding: 10px; }
.user { color: blue; }
.ai { color: green; }
input, button { padding: 10px; width: 80%; }
button { width: 18%; }
</style>
</head>
<body>

<h2 style="text-align:center;">ASS APP</h2>

<div id="chat"></div>

<div style="display:flex; padding:10px;">
<input id="input" placeholder="Sorunu yaz">
<button onclick="send()">Gönder</button>
</div>

<script>
async function send() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let text = input.value;
    if (!text) return;

    chat.innerHTML += `<div class="user">Sen: ${text}</div>`;
    input.value = "";

    try {
        let res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer YOUR_API_KEY"
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: "Sen ASS APP adlı asistansın." },
                    { role: "user", content: text }
                ]
            })
        });

        let data = await res.json();

        chat.innerHTML += `<div class="ai">AI: ${data.choices[0].message.content}</div>`;
    } catch (e) {
        chat.innerHTML += `<div class="ai">Hata: API tarayıcıdan engellendi (CORS)</div>`;
    }
}
</script>

</body>
</html>
