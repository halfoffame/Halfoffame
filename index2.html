<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS App</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:500px;
    height:800px;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.top{
    background:#1e293b;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#38bdf8;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    padding:12px;
    margin:10px 0;
    border-radius:15px;
    max-width:80%;
    line-height:1.5;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.bot{
    background:#374151;
}

.bottom{
    display:flex;
    padding:15px;
    background:#1e293b;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0f172a;
    color:white;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

    <div class="top">
        AS App
    </div>

    <div class="chat" id="chat"></div>

    <div class="bottom">
        <input type="text" id="text" placeholder="Bir soru yaz">
        <button onclick="send()">Gönder</button>
    </div>

</div>

<script>

const API_KEY = "BURAYA_OPENAI_API_KEY";

let messages = [

{
    role:"system",
    content:"Sen AS App isimli çok gelişmiş bir yapay zekasın."
}

];

function addMessage(text,type){

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="msg ${type}">
            ${text}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const input = document.getElementById("text");

    const userText = input.value;

    if(userText.trim() === "") return;

    addMessage(userText,"user");

    messages.push({
        role:"user",
        content:userText
    });

    input.value = "";

    addMessage("Yazıyor...","bot");

    try{

        const response = await fetch(
            "https://api.openai.com/v1/chat/completions",
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + API_KEY
            },

            body:JSON.stringify({

                model:"gpt-4o-mini",

                messages:messages

            })

        });

        const data = await response.json();

        document.querySelector(".bot:last-child").remove();

        const ai = data.choices[0].message.content;

        addMessage(ai,"bot");

        messages.push({
            role:"assistant",
            content:ai
        });

    }catch(e){

        document.querySelector(".bot:last-child").innerHTML =
        "API anahtarı hatalı veya internet bağlantısı yok.";

    }

}

</script>

</body>
</html>
