<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>ASS APP</title>
  <style>
    body { background:#0f172a; color:white; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { width:400px; background:#1e293b; padding:20px; border-radius:20px; }
    textarea { width:100%; height:100px; }
    button { width:100%; padding:10px; margin-top:10px; }
    #reply { margin-top:10px; }
  </style>
</head>
<body>

<div class="box">
  <h1>ASS APP</h1>
  <textarea id="msg"></textarea>
  <button onclick="send()">Gönder</button>
  <div id="reply"></div>
</div>

<script>
async function send() {
  const message = document.getElementById("msg").value;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  document.getElementById("reply").innerText = data.reply;
}
</script>

</body>
</html>
