<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.chat-box {
    height: 70vh;
    overflow-y: auto;
    background: #111827;
    padding: 15px;
    border-radius: 10px;
}

.msg {
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.user {
    background: #2563eb;
    text-align: right;
}

.bot {
    background: #374151;
}

.input-area {
    display: flex;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 15px;
    margin-left: 10px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>ASS APP AI Chat</h2>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input id="input" placeholder="Mesaj yaz...">
        <button onclick="sendMessage()">Gönder</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value;

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const res = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: text
            })
        });

        const data = await res.json();
        addMessage(data.reply, "bot");

    } catch (err) {
        addMessage("Bağlantı hatası!", "bot");
    }
}
</script>

</body>
</html>
