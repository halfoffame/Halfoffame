<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:white;
}

h1{
    text-align:center;
    font-size:70px;
}

#chat{
    height:500px;
    overflow-y:auto;
    border:1px solid #ddd;
    margin:20px;
    padding:20px;
}

#bar{
    display:flex;
    margin:20px;
}

#message{
    flex:1;
    padding:15px;
    font-size:18px;
}

button{
    padding:15px 25px;
}
</style>
</head>
<body>

<h1>ASS APP</h1>

<div id="chat"></div>

<div id="bar">
    <input id="message" placeholder="Bir şey sor...">
    <button onclick="sendMessage()">Gönder</button>
</div>

<script>

async function sendMessage(){

    const input = document.getElementById("message");
    const chat = document.getElementById("chat");

    const text = input.value.trim();

    if(text === "") return;

    chat.innerHTML += "<p><b>Sen:</b> " + text + "</p>";

    input.value = "";

    try{

        const response = await fetch("/api/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        });

        const data = await response.json();

        chat.innerHTML +=
          "<p><b>ASS APP:</b> " +
          data.reply +
          "</p>";

        chat.scrollTop = chat.scrollHeight;

    }catch(err){

        chat.innerHTML +=
          "<p><b>ASS APP:</b> Sunucuya bağlanılamadı.</p>";

    }

}
</script>

</body>
</html>
