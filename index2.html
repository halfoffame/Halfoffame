<script>
async function send() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let text = input.value;
    if (!text) return;

    // Kullanıcı mesajı
    chat.innerHTML += `<div class="message user">Sen: ${text}</div>`;
    input.value = "";

    // Yükleniyor efekti
    chat.innerHTML += `<div class="message ai" id="loading">AI: yazıyor...</div>`;
    chat.scrollTop = chat.scrollHeight;

    let response = await realAI(text);

    document.getElementById("loading").remove();

    chat.innerHTML += `<div class="message ai">AI: ${response}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

async function realAI(text) {
    try {
        let res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer YOUR_API_KEY"
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: "Sen ASS APP adlı yardımcı bir yapay zekasın." },
                    { role: "user", content: text }
                ]
            })
        });

        let data = await res.json();

        return data.choices[0].message.content;

    } catch (error) {
        return "Hata oluştu: API bağlantısı kontrol et";
    }
}
</script>
