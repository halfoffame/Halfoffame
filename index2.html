<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:white;
}

h1{
    text-align:center;
    font-size:80px;
    margin-top:30px;
}

#chat{
    width:90%;
    max-width:1200px;
    height:500px;
    margin:auto;
    border:2px solid #ddd;
    border-radius:20px;
    padding:20px;
    overflow-y:auto;
}

#controls{
    width:90%;
    max-width:1200px;
    margin:20px auto;
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    font-size:18px;
}

button{
    padding:15px 25px;
    font-size:18px;
    cursor:pointer;
}

.user{
    margin:10px 0;
}

.ai{
    margin:10px 0;
}
</style>
</head>
<body>

<h1>ASS APP</h1>

<div id="chat"></div>

<div id="controls">
    <input id="message" placeholder="Mesajınızı yazın...">
    <button onclick="sendMessage()">Gönder</button>
</div>

<script>

function sendMessage(){

    const input = document.getElementById("message");
    const text = input.value.trim();

    if(!text) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="user">
            <b>Sen:</b> ${text}
        </div>
    `;

    let answer =
      "ASS APP çalışıyor. Yapay zeka bağlantısı eklenmediği için bu sürüm yalnızca örnek arayüzdür.";

    chat.innerHTML += `
        <div class="ai">
            <b>ASS APP:</b> ${answer}
        </div>
    `;

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
