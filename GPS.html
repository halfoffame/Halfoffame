<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP GPS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}
header{
    background:#0078ff;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
}
.search-box{
    padding:10px;
    text-align:center;
}
input{
    width:70%;
    padding:10px;
    font-size:16px;
}
button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
#map{
    height:80vh;
}
</style>
</head>
<body>

<header>ASS APP GPS</header>

<div class="search-box">
    <input type="text" id="location" placeholder="Bir yer yaz...">
    <button onclick="searchLocation()">Ara</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([39.9255, 32.8663], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

var marker;

async function searchLocation() {

    let place = document.getElementById("location").value;

    let response = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${place}`
    );

    let data = await response.json();

    if(data.length > 0){

        let lat = data[0].lat;
        let lon = data[0].lon;

        map.setView([lat, lon], 14);

        if(marker){
            map.removeLayer(marker);
        }

        marker = L.marker([lat, lon])
        .addTo(map)
        .bindPopup(place)
        .openPopup();

    }else{
        alert("Konum bulunamadı!");
    }
}
</script>

</body>
</html>
