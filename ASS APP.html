<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
display:flex;
height:100vh;
background:#202123;
color:white;
}

.sidebar{
width:260px;
background:#171717;
display:flex;
flex-direction:column;
border-right:1px solid #333;
}

.logo{
padding:20px;
font-size:22px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #333;
}

.new-chat{
margin:15px;
padding:12px;
border:none;
border-radius:8px;
background:#10a37f;
color:white;
cursor:pointer;
font-size:15px;
}

.chat-list{
flex:1;
overflow-y:auto;
}

.chat-item{
padding:12px;
margin:8px;
background:#2a2b32;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-item:hover{
background:#3a3b45;
}

.delete-btn{
color:red;
cursor:pointer;
font-weight:bold;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:#343541;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #444;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.user{
background:#444654;
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:80%;
margin-left:auto;
}

.bot{
background:#343541;
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:80%;
}

.input-area{
display:flex;
padding:15px;
background:#343541;
}

#messageInput{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button.send{
margin-left:10px;
padding:14px 20px;
border:none;
border-radius:10px;
background:#10a37f;
color:white;
cursor:pointer;
font-size:16px;
}

.empty{
text-align:center;
margin-top:50px;
opacity:0.6;
}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">ASS APP PRO</div>

<button class="new-chat" onclick="newChat()">
+ Yeni Sohbet
</button>

<div class="chat-list" id="chatList"></div>
</div>

<div class="main">

<div class="header">
ASS APP PRO AI
</div>

<div class="messages" id="messages">
<div class="empty">
Yeni sohbet başlatın.
</div>
</div>

<div class="input-area">
<input id="messageInput" placeholder="Mesajınızı yazın...">
<button class="send" onclick="sendMessage()">Gönder</button>
</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("assapp_chats")) || [];
let currentChat = null;

function saveChats(){
localStorage.setItem(
"assapp_chats",
JSON.stringify(chats)
);
}

function newChat(){

const chat = {
id:Date.now(),
title:"Yeni Sohbet",
messages:[]
};

chats.unshift(chat);
currentChat = chat.id;

saveChats();
renderChats();
renderMessages();

}

function renderChats(){

const list =
document.getElementById("chatList");

list.innerHTML="";

chats.forEach(chat=>{

const div =
document.createElement("div");

div.className="chat-item";

div.innerHTML=`
<span>${chat.title}</span>
<span class="delete-btn"
onclick="deleteChat(${chat.id},event)">
✕
</span>
`;

div.onclick=()=>{
currentChat=chat.id;
renderMessages();
};

list.appendChild(div);

});

}

function renderMessages(){

const area =
document.getElementById("messages");

const chat =
chats.find(c=>c.id===currentChat);

if(!chat){
area.innerHTML=
'<div class="empty">Yeni sohbet başlatın.</div>';
return;
}

area.innerHTML="";

chat.messages.forEach(msg=>{

const div =
document.createElement("div");

div.className=msg.role;

div.textContent=msg.text;

area.appendChild(div);

});

area.scrollTop=area.scrollHeight;

}

function deleteChat(id,e){

e.stopPropagation();

chats =
chats.filter(c=>c.id!==id);

if(currentChat===id){
currentChat=null;
}

saveChats();
renderChats();
renderMessages();

}

function sendMessage(){

const input =
document.getElementById("messageInput");

const text =
input.value.trim();

if(!text) return;

if(!currentChat){
newChat();
}

const chat =
chats.find(c=>c.id===currentChat);

if(chat.messages.length===0){
chat.title=text.substring(0,25);
}

chat.messages.push({
role:"user",
text:text
});

renderMessages();

input.value="";

setTimeout(()=>{

let cevap =
"Merhaba! Ben ASS APP PRO. Şu anda demo modundayım. Buraya Gemini API bağlayarak gerçek yapay zeka cevapları alabilirsin.";

chat.messages.push({
role:"bot",
text:cevap
});

saveChats();
renderMessages();

},500);

saveChats();
renderChats();

}

renderChats();

</script>

</body>
</html>
