<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASS APP PRO</title>
<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  font-family:Arial,sans-serif;
}
.sidebar{
  width:260px;
  background:#171717;
  color:white;
  padding:10px;
}
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  background:#202123;
  color:white;
}
.messages{
  flex:1;
  overflow:auto;
  padding:20px;
}
.input-area{
  display:flex;
  padding:10px;
}
input{
  flex:1;
  padding:12px;
}
button{
  padding:12px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>ASS APP PRO</h2>
  <button onclick="newChat()">+ Yeni Sohbet</button>
  <div id="chatList"></div>
</div>

<div class="main">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="prompt" placeholder="Mesaj yaz...">
    <button onclick="sendMessage()">Gönder</button>
  </div>
</div>

<script>
const API_KEY = "BURAYA_GEMINI_API_KEY";

function newChat(){
  alert("Yeni sohbet oluşturulacak.");
}

async function sendMessage(){
  const prompt = document.getElementById("prompt").value;

  document.getElementById("messages").innerHTML +=
    "<p><b>Sen:</b> " + prompt + "</p>";

  // Gemini API çağrısı burada yapılır
}
</script>

</body>
</html>
