<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ASS APP AI</title>
<style>
body{
margin:0;
font-family:Arial;
background:#202123;
color:white;
}

.header{
background:#343541;
padding:15px;
text-align:center;
font-size:20px;
}

.chat{
height:80vh;
overflow-y:auto;
padding:10px;
}

.msg{
padding:10px;
margin:10px;
border-radius:10px;
max-width:80%;
}

.user{
background:#444654;
margin-left:auto;
text-align:right;
}

.ai{
background:#2b2c36;
}

.bottom{
display:flex;
padding:10px;
background:#343541;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
}

button{
padding:12px;
background:#10a37f;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">ASS APP - AI CHATBOT</div>

<div class="chat" id="chat"></div>

<div class="bottom">
<input id="input" placeholder="Sorunu yaz...">
<button onclick="send()">Gönder</button>
</div>

<script>

const API_KEY = "BURAYA_GEMINI_API_KEY";

async function send(){

let text = document.getElementById("input").value;
if(!text) return;

document.getElementById("chat").innerHTML +=
`<div class="msg user">${text}</div>`;

document.getElementById("input").value="";

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{
parts:[{
text:`
Sen ASS APP adlı bir yapay zekasın.
Çok uzun, açıklayıcı, öğretici cevap ver.
Matematik, tarih, fen, Türkçe, sosyal bilgiler ve kodlama sorularını çöz.

Soru:
${text}
`
}]
}]
})
}
);

const data = await res.json();

let answer =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "Cevap alınamadı";

document.getElementById("chat").innerHTML +=
`<div class="msg ai">${answer}</div>`;

}

</script>

</body>
</html>
