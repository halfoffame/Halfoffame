<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Aras Portal</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

.container{
margin-top:100px;
}

input{
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#0077ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#portal{
display:none;
margin-top:50px;
}

#ai{
display:none;
margin-top:20px;
}

#cevap{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div id="login" class="container">

<h2>Giriş Yap</h2>

<input id="email" placeholder="E-posta"><br> <input id="sifre" type="password" placeholder="Şifre"><br>

<button onclick="giris()">Giriş Yap</button>

<p id="hata"></p>

</div>

<div id="portal">

<h2>Aras Portal</h2>

<button onclick="aiAc()">Yapay Zeka</button>

</div>

<div id="ai">

<h3>Yapay Zeka</h3>

<input id="soru" placeholder="Bir şey yaz...">

<button onclick="cevapla()">Gönder</button>

<p id="cevap"></p>

</div>

<script>

function giris(){

let email=document.getElementById("email").value;
let sifre=document.getElementById("sifre").value;

if(email==="halfoffame" && sifre==="0317Aa0317"){

document.getElementById("login").style.display="none";
document.getElementById("portal").style.display="block";

}else{

document.getElementById("hata").innerText="Giriş bilgileri yanlış";

}

}

function aiAc(){

document.getElementById("ai").style.display="block";

}

function cevapla(){

let soru=document.getElementById("soru").value.toLowerCase();
let cevap="";

if(soru.includes("merhaba")){
cevap="Merhaba sana nasıl yardımcı olabilirim 👋";
}
else if(soru.includes("nasılsın?")){
cevap="İyiyim, sen nasılsın? 😊";
}
else if(soru.includes("adın ne")){
cevap="Ben Aras Portal yapay zekasıyım.Sana nasıl yardımcı olabilirim? 🤖";
}
else if(soru.includes("matematik")){
cevap="Matematik, insanlığın temel ihtiyaçları olan sayma, ölçme, arazi sınırlarını belirleme ve takvim yapma gibi pratik gereksinimlerden doğmuştur";
}
else if(soru.includes("seni kim kodladı")){
cevap="Aras Ilız benim bütün kodlarımı hazırladı"
}
else if(soru.includes("Einstein kimdir?")){
cevap="Einstein matematik dehası olarak tanınır. Bu kişi matematiğe birçok katkı sağlamıştır."
}
else{
cevap="Bu sorunun cevabını henüz bilmiyorum 🙂";
}

document.getElementById("cevap").innerText=cevap;

}

</script>

</body>
</html>
