<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ASS APP AI</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  max-width:800px;
  margin:auto;
  padding:20px;
}

#chat{
  height:70vh;
  overflow:auto;
  background:#111827;
  padding:10px;
  border-radius:10px;
}

.msg{
  margin:8px;
  padding:10px;
  border-radius:8px;
}

.user{background:#2563eb;text-align:right}
.bot{background:#374151}

input{
  width:80%;
  padding:10px;
}

button{
  padding:10px;
}
</style>
</head>

<body>

<h2>🤖 ASS APP</h2>

<div id="chat"></div>

<input id="input" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>

<script>
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  const chat=document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">Sen: ${text}</div>`;

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    chat.innerHTML += `<div class="msg bot">ASS APP: ${data.reply}</div>`;
  } catch (err) {
    chat.innerHTML += `<div class="msg bot">Bağlantı hatası ❌</div>`;
  }

  input.value = "";
}
</script>

</body>
</html>
